rooms:
  square:
    name_zh: 霓虹廣場
    name_en: Neon Square
    description_zh: '全息廣告在酸雨後的積水上閃爍。情報販子與企業特工混雜在人群中。

      '
    description_en: 'Holographic ads flicker on rain-slick pavement. Fixers and corpo
      agents mingle in the crowd.

      '
    district: watson
    grid_x: 1
    grid_y: 1
    tags:
    - transit
    - metro
    exits:
      north: alley
      east: tutorial
      south: docks
      west: ripper_clinic
      up: square_rooftop
  alley:
    name_zh: 陰暗小巷
    name_en: Dark Alley
    description_zh: 霓虹反光在潮濕牆面上流動。南邊回到廣場。
    description_en: Neon reflections crawl across wet walls. South leads back to the
      square.
    district: watson
    grid_x: 1
    grid_y: 0
    hidden_hint_zh: 牆縫裡似乎藏著走私貨櫃的密碼。
    hidden_hint_en: A smuggler cache password seems hidden in the wall seam.
    exits:
      south: square
      down: undercity
      west: kabuki_lounge
      east: little_china_gate
  kabuki_lounge:
    name_zh: 歌舞伎夜總會
    name_en: Kabuki Lounge
    description_zh: '霓虹簾幕後傳來合成爵士與低語。這裡只接待已確認年齡的客人。

      '
    description_en: 'Synthetic jazz and whispers behind neon curtains. Patrons must
      confirm they are 18+.

      '
    district: kabuki
    grid_x: 0
    grid_y: 0
    tags:
    - mature
    - club
    - lounge
    - rest
    exits:
      east: alley
      west: kabuki_bazaar
      north: kabuki_vip
  kabuki_vip:
    name_zh: VIP 包廂區
    name_en: VIP Booth Wing
    description_zh: '隱私場與腦舞預覽艙被絨簾隔開。保鑣的義眼掃過每一位進場者。

      '
    description_en: 'Privacy fields and BD preview pods sit behind velvet curtains.
      A bouncer''s cyber-eye tracks every entrant.

      '
    district: kabuki
    grid_x: 0
    grid_y: 1
    tags:
    - mature
    - club
    exits:
      south: kabuki_lounge
  kabuki_bazaar:
    name_zh: 歌舞伎灰市
    name_en: Kabuki Gray Bazaar
    description_zh: '攤販兜售改裝晶片與來路不明的情報。東邊是夜總會，南邊通往小中國街。

      '
    description_en: 'Stalls hawk mod chips and questionable intel. East to the lounge;
      south to Little China Gate.

      '
    district: kabuki
    grid_x: -1
    grid_y: 0
    tags:
    - bazaar
    - shop
    shop_id: kabuki_bazaar
    exits:
      east: kabuki_lounge
      south: little_china_gate
      north: kabuki_2_3
  little_china_gate:
    name_zh: 小中國街牌樓
    name_en: Little China Gate
    description_zh: 紅色牌樓下香火與合成雨味交織。路邊藥販攪拌草藥湯，東邊通往廟宇，西邊回到小巷。
    description_en: 'Incense and synthetic rain mix under a red arch. A herbalist
      stirs broth by the gate—east to the shrine, west to the alley.'
    district: little_china
    grid_x: 2
    grid_y: 0
    exits:
      north: kabuki_bazaar
      east: shrine
      west: alley
      south: little_china_2_0
  shrine:
    name_zh: 霓虹神社
    name_en: Neon Shrine
    description_zh: '全息燭火在傳統木柱間飄動。人性與信仰在義體時代顯得格外脆弱。

      '
    description_en: 'Holo candles drift between wooden pillars—faith feels fragile
      in the chrome age.

      '
    district: little_china
    grid_x: 3
    grid_y: 0
    tags:
    - shrine
    exits:
      west: little_china_gate
      down: data_crypt
  data_crypt:
    name_zh: 資料墓穴
    name_en: Data Crypt
    description_zh: '積水的伺服器機櫃閃著錯誤代碼。東邊通往地下墓穴，北邊可回到地下廢墟。

      '
    description_en: 'Flooded server racks blink error codes. East leads to the crypt;
      north to the undercity ruins.

      '
    district: undercity
    grid_x: 3
    grid_y: -1
    tags:
    - undercity
    - net
    exits:
      up: shrine
      north: undercity
      east: crypt
  crypt:
    name_zh: 地下墓穴
    name_en: Underground Crypt
    description_zh: '潮濕石階向下延伸，全息蠟燭在義體殘骸間飄浮。西邊是資料墓穴，北邊通往企業資料庫。

      '
    description_en: 'Damp stone steps descend—holo candles drift among chrome debris.
      West to the data crypt; north to the corporate vault.

      '
    district: undercity
    grid_x: 4
    grid_y: -1
    tags:
    - undercity
    - crypt
    exits:
      west: data_crypt
      north: data_vault
      south: undercity
  data_vault:
    name_zh: 企業資料庫
    name_en: Corporate Data Vault
    description_zh: '泰瑞封存機密檔案的冷卻庫，終端機仍連著廣場核心節點。南邊回到地下墓穴。

      '
    description_en: 'A Tyrell cold-storage vault for sealed files—a terminal still
      peers into the plaza core node. South leads back to the crypt.

      '
    district: undercity
    grid_x: 4
    grid_y: 0
    tags:
    - undercity
    - net
    - vault
    exits:
      south: crypt
  square_rooftop:
    name_zh: 廣場屋頂
    name_en: Square Rooftop
    description_zh: 霓虹燈管在腳下嗡鳴，夜城天際線一覽無遺。
    description_en: Neon hums underfoot—the skyline spreads before you.
    district: watson
    grid_x: 1
    grid_y: 1
    tags:
    - rooftop
    exits:
      down: square
  undercity:
    name_zh: 地下廢墟
    name_en: Undercity Ruins
    description_zh: 積水與電纜交織的地下層，腦舞艙與資料墓穴的入口。
    description_en: Flooded tunnels and cables—the BD booths and data crypts begin
      here.
    district: undercity
    grid_x: 1
    grid_y: -1
    tags:
    - undercity
    exits:
      up: alley
      north: docks
      east: bd_den
      south: data_crypt
      west: crypt
  bd_den:
    name_zh: 地下腦舞密艙
    name_en: Underground BD Den
    description_zh: '隔間裡的腦舞艙覆著汗漬與消毒水味。櫃台貼著「18+ 限定」全息標籤。

      '
    description_en: 'Booths reek of sanitizer and sweat. A holo sticker reads "18+
      only."

      '
    district: undercity
    grid_x: 2
    grid_y: -1
    tags:
    - mature
    - braindance
    exits:
      west: undercity
      east: undercity_4_2
  tutorial:
    name_zh: 新手訓練場
    name_en: Training Yard
    description_zh: '教官的全息投影正在等待新進邊緣人。這裡是訓練場中樞。

      '
    description_en: 'An instructor holo waits for new edgerunners. This is the training
      hub.

      '
    district: tutorial
    grid_x: 2
    grid_y: 1
    exits:
      west: square
      up: tutorial_briefing
      north: tutorial_combat
      east: tutorial_net
      south: tutorial_armory
  tutorial_briefing:
    name_zh: 任務簡報室
    name_en: Mission Briefing Room
    description_zh: '全息委託板與派系簡介投影循環播放。新手可在這裡熟悉 gigs、stats 與 recall。

      '
    description_en: 'Holo gig boards and faction primers loop on the walls—learn gigs,
      stats, and recall here.

      '
    district: tutorial
    grid_x: 2
    grid_y: 2
    tags:
    - tutorial
    - social
    exits:
      down: tutorial
      east: tutorial_debrief
  tutorial_debrief:
    name_zh: 畢業檢定室
    name_en: Graduation Checkpoint
    description_zh: '全息評分牆與出口閘門並列。完成輪值檢定後，導師會蓋上學員結業章。

      '
    description_en: 'A holo score wall faces the exit gate—finish your rotation drill
      and the warden stamps your graduate badge.

      '
    district: tutorial
    grid_x: 3
    grid_y: 2
    tags:
    - tutorial
    - social
    exits:
      west: tutorial_briefing
  tutorial_combat:
    name_zh: 戰鬥訓練區
    name_en: Combat Drill Zone
    description_zh: '軟墊與全息標靶覆蓋地面，陪練機械人發出單調的待機嗡鳴。

      '
    description_en: 'Padded mats and holo targets cover the floor. A sparring drone
      hums on standby.

      '
    district: tutorial
    grid_x: 2
    grid_y: 0
    exits:
      south: tutorial
      north: tutorial_range
      east: tutorial_course
  tutorial_course:
    name_zh: 障礙訓練道
    name_en: Obstacle Course
    description_zh: '掃描信標與互動閘門排列成基礎課程。東側靶標機供額外戰鬥練習。

      '
    description_en: 'Scan beacons and interact gates line a basic drill lane—with
      extra combat targets at the end.

      '
    district: tutorial
    grid_x: 3
    grid_y: 0
    tags:
    - tutorial
    - interact
    exits:
      west: tutorial_combat
  tutorial_net:
    name_zh: 駭客模擬區
    name_en: Netrun Sim Bay
    description_zh: '隔離的訓練終端閃爍綠色字元，教練監看著你的 RAM 消耗。

      '
    description_en: 'Isolated training terminals flicker green glyphs while a coach
      watches your RAM drain.

      '
    district: tutorial
    grid_x: 3
    grid_y: 1
    exits:
      west: tutorial
      north: tutorial_medbay
  tutorial_medbay:
    name_zh: 模擬義體診所
    name_en: Sim Ripper Bay
    description_zh: '無菌霧面隔間與示範手術燈。可在這裡練習 install、use 與義體槽位概念（安全模擬）。

      '
    description_en: 'Sterile booths and demo surgical lamps—practice install, use,
      and cyber slots in a safe sim.

      '
    district: tutorial
    grid_x: 3
    grid_y: 2
    tags:
    - tutorial
    - ripperdoc
    exits:
      south: tutorial_net
  tutorial_armory:
    name_zh: 訓練裝備庫
    name_en: Training Armory
    description_zh: '企業贊助的訓練武器與護具整齊掛在架上，供新人試用。

      '
    description_en: 'Corporate-sponsored training weapons and armor hang ready for
      rookies to try.

      '
    district: tutorial
    grid_x: 2
    grid_y: 2
    exits:
      north: tutorial
      west: tutorial_canteen
  tutorial_canteen:
    name_zh: 學員餐廳
    name_en: Trainee Canteen
    description_zh: '合成餐與能量飲的自動販賣機嗡嗡運轉。適合練習 eat、drink、use 與補給管理。

      '
    description_en: 'Synth-food dispensers hum—practice eat, drink, use, and supply
      management here.

      '
    district: tutorial
    grid_x: 1
    grid_y: 2
    tags:
    - tutorial
    - consumables
    - rest
    - safe
    exits:
      east: tutorial_armory
  tutorial_range:
    name_zh: 射擊靶場
    name_en: Firing Range
    description_zh: '彈痕累累的軌道靶在霧面護盾後滑動，空氣裡殘留火藥味。

      '
    description_en: 'Scarred rail targets slide behind frosted shields; gunpowder
      hangs in the air.

      '
    district: tutorial
    grid_x: 2
    grid_y: -1
    exits:
      south: tutorial_combat
  docks:
    name_zh: 貨櫃碼頭
    name_en: Container Docks
    description_zh: 起重機低鳴，走私貨櫃堆疊至霧中。北邊是霓虹廣場。
    description_en: Cranes groan as smuggler containers vanish into the fog. North
      leads to the square.
    district: docks
    grid_x: 1
    grid_y: 2
    tags:
    - vehicle_dealer
    - transit
    shop_id: docks_gray
    exits:
      north: square
      down: undercity
      south: docks_2_1
      east: combat_zone_gate
  ripper_clinic:
    name_zh: 義體診所
    name_en: Ripper Clinic
    description_zh: 手術燈在霧化玻璃後閃爍。東邊回到霓虹廣場。
    description_en: Surgical lamps flicker behind frosted glass. East leads back to
      Neon Square.
    district: watson
    grid_x: 0
    grid_y: 1
    tags:
    - shop
    - ripperdoc
    - clinic
    - rest
    - safe
    shop_id: ripperdoc
    exits:
      east: square
      west: corpo_lobby
      north: watson_3_2
  corpo_lobby:
    name_zh: 企業大廳
    name_en: Corporate Lobby
    description_zh: '冷色大理石與武裝保全。東邊是義體診所，西邊通往企業廣場。

      '
    description_en: 'Cold marble and armed security. East to the ripper clinic; west
      to the corpo plaza.

      '
    district: corpo
    grid_x: -1
    grid_y: 1
    exits:
      east: ripper_clinic
      west: corpo_plaza
  corpo_plaza:
    name_zh: 企業廣場
    name_en: Corpo Plaza
    description_zh: 全息企業標誌在酸雨中旋轉。荒坂與軍武的勢力在這裡交錯；接待員掃描每一位訪客。
    description_en: 'Holo corporate logos spin in acid rain—Arasaka and Militech influence
      collides here. Handlers scan every visitor.'
    district: corpo
    grid_x: -2
    grid_y: 1
    tags:
    - corpo
    - transit
    exits:
      east: tyrell_plaza
      north: corpo_3_1
  watson_flat:
    name_zh: 沃森公寓
    name_en: Watson Flat
    description_zh: '你的公寓——狹小但安全。牆上掛著舊海報，角落有個私人儲物櫃（stash）。

      可用 transit 或 drive 往返街區。

      '
    description_en: 'Your flat—cramped but safe. A stash locker sits in the corner.

      Use transit or drive to reach the district.

      '
    district: watson
    grid_x: 0
    grid_y: 2
    tags:
    - housing
    - home
    - rest
    - safe
    exits: {}
  tyrell_plaza:
    name_zh: 泰瑞廣場
    name_en: Tyrell Plaza
    description_zh: 高聳實驗室大樓與冷色全息廣告，精英與禁忌科技交會之地。巡邏無人機在樣本運輸車上方盤旋。
    description_en: Towering labs and cold holo ads—elites and forbidden tech meet
      here. Patrol drones circle above sample convoys.
    district: tyrell
    grid_x: 0
    grid_y: 0
    tags:
    - transit
    - corpo
    exits:
      west: corpo_plaza
      south: tyrell_3_5
  combat_zone_gate:
    name_zh: 戰鬥區界碑
    name_en: Combat Zone Gate
    description_zh: 燒毀的界碑與塗鴉警告：越過此線，規則由槍桿決定。界碑守衛記錄每一個穿越者。
    description_en: 'A scorched marker and graffiti warn: past this line, guns set
      the rules. A warden logs every crossing.'
    district: combat_zone
    grid_x: 0
    grid_y: 0
    tags:
    - transit
    exits:
      west: docks
      south: combat_zone_3_0
  watson_0_0:
    name_zh: watson 街區 (0,0)
    name_en: Watson Block (0,0)
    description_zh: 霓虹與酸雨交織的 watson 街道格點 (0,0)。全息廣告在積水上閃爍。
