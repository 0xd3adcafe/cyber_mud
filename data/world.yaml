start_room: square
respawn_room: ripper_clinic

factions:
  arasaka: 荒坂公司
  maelstrom: 漩渦幫
  militech: 軍武科技
  tyrell: 泰瑞公司

room_items:
  square: [glowstick, knife, jacket, cyber_arm_kit, mod_chip, liberty_pistol, pipe, synth_ramen]
  alley: [rusty_key]
  tutorial: [glowstick, field_manual]
  tutorial_briefing: [field_manual]
  tutorial_armory: [trainee_blade, training_sidearm, trainee_undersuit, trainee_vest, trainee_pants, trainee_boots, trainee_helmet, trainee_baton, practice_cyber_kit, mod_chip, med_stim]
  tutorial_canteen: [trainee_ration, trainee_flask, synth_ramen, energy_drink, med_stim]
  tutorial_course: [field_manual, trainee_baton]
  tutorial_medbay: [practice_cyber_kit, med_stim, trauma_kit]
  tutorial_range: [training_sidearm, training_carbine, trainee_helmet, training_smartgun]

rooms:
  square:
    name_zh: 霓虹廣場
    name_en: Neon Square
    description_zh: |
      全息廣告在酸雨後的積水上閃爍。情報販子與企業特工混雜在人群中。
    description_en: |
      Holographic ads flicker on rain-slick pavement. Fixers and corpo agents mingle in the crowd.
    district: watson
    grid_x: 1
    grid_y: 1
    tags: [transit, metro]
    exits:
      north: alley
      east: tutorial
      south: docks
      west: ripper_clinic
      up: square_rooftop
  alley:
    name_zh: 陰暗小巷
    name_en: Dark Alley
    description_zh: 霓虹反光在潮濕牆面上流動。南邊回到廣場。
    description_en: Neon reflections crawl across wet walls. South leads back to the square.
    district: watson
    grid_x: 1
    grid_y: 0
    hidden_hint_zh: 牆縫裡似乎藏著走私貨櫃的密碼。
    hidden_hint_en: A smuggler cache password seems hidden in the wall seam.
    exits:
      south: square
      down: undercity
  square_rooftop:
    name_zh: 廣場屋頂
    name_en: Square Rooftop
    description_zh: 霓虹燈管在腳下嗡鳴，夜城天際線一覽無遺。
    description_en: Neon hums underfoot—the skyline spreads before you.
    district: watson
    grid_x: 1
    grid_y: 1
    tags: [rooftop]
    exits:
      down: square
  undercity:
    name_zh: 地下廢墟
    name_en: Undercity Ruins
    description_zh: 積水與電纜交織的地下層，腦舞艙與資料墓穴的入口。
    description_en: Flooded tunnels and cables—the BD booths and data crypts begin here.
    district: undercity
    grid_x: 1
    grid_y: -1
    tags: [undercity]
    exits:
      up: alley
      north: docks
  tutorial:
    name_zh: 新手訓練場
    name_en: Training Yard
    description_zh: |
      教官的全息投影正在等待新進邊緣人。這裡是訓練場中樞。
    description_en: |
      An instructor holo waits for new edgerunners. This is the training hub.
    district: tutorial
    grid_x: 2
    grid_y: 1
    exits:
      west: square
      up: tutorial_briefing
      north: tutorial_combat
      east: tutorial_net
      south: tutorial_armory
  tutorial_briefing:
    name_zh: 任務簡報室
    name_en: Mission Briefing Room
    description_zh: |
      全息委託板與派系簡介投影循環播放。新手可在這裡熟悉 gigs、stats 與 recall。
    description_en: |
      Holo gig boards and faction primers loop on the walls—learn gigs, stats, and recall here.
    district: tutorial
    grid_x: 2
    grid_y: 2
    tags: [tutorial, social]
    exits:
      down: tutorial
  tutorial_combat:
    name_zh: 戰鬥訓練區
    name_en: Combat Drill Zone
    description_zh: |
      軟墊與全息標靶覆蓋地面，陪練機械人發出單調的待機嗡鳴。
    description_en: |
      Padded mats and holo targets cover the floor. A sparring drone hums on standby.
    district: tutorial
    grid_x: 2
    grid_y: 0
    exits:
      south: tutorial
      north: tutorial_range
      east: tutorial_course
  tutorial_course:
    name_zh: 障礙訓練道
    name_en: Obstacle Course
    description_zh: |
      掃描信標與互動閘門排列成基礎課程。東側靶標機供額外戰鬥練習。
    description_en: |
      Scan beacons and interact gates line a basic drill lane—with extra combat targets at the end.
    district: tutorial
    grid_x: 3
    grid_y: 0
    tags: [tutorial, interact]
    exits:
      west: tutorial_combat
  tutorial_net:
    name_zh: 駭客模擬區
    name_en: Netrun Sim Bay
    description_zh: |
      隔離的訓練終端閃爍綠色字元，教練監看著你的 RAM 消耗。
    description_en: |
      Isolated training terminals flicker green glyphs while a coach watches your RAM drain.
    district: tutorial
    grid_x: 3
    grid_y: 1
    exits:
      west: tutorial
      north: tutorial_medbay
  tutorial_medbay:
    name_zh: 模擬義體診所
    name_en: Sim Ripper Bay
    description_zh: |
      無菌霧面隔間與示範手術燈。可在這裡練習 install、use 與義體槽位概念（安全模擬）。
    description_en: |
      Sterile booths and demo surgical lamps—practice install, use, and cyber slots in a safe sim.
    district: tutorial
    grid_x: 3
    grid_y: 2
    tags: [tutorial, ripperdoc]
    exits:
      south: tutorial_net
  tutorial_armory:
    name_zh: 訓練裝備庫
    name_en: Training Armory
    description_zh: |
      企業贊助的訓練武器與護具整齊掛在架上，供新人試用。
    description_en: |
      Corporate-sponsored training weapons and armor hang ready for rookies to try.
    district: tutorial
    grid_x: 2
    grid_y: 2
    exits:
      north: tutorial
      west: tutorial_canteen
  tutorial_canteen:
    name_zh: 學員餐廳
    name_en: Trainee Canteen
    description_zh: |
      合成餐與能量飲的自動販賣機嗡嗡運轉。適合練習 eat、drink、use 與補給管理。
    description_en: |
      Synth-food dispensers hum—practice eat, drink, use, and supply management here.
    district: tutorial
    grid_x: 1
    grid_y: 2
    tags: [tutorial, consumables]
    exits:
      east: tutorial_armory
  tutorial_range:
    name_zh: 射擊靶場
    name_en: Firing Range
    description_zh: |
      彈痕累累的軌道靶在霧面護盾後滑動，空氣裡殘留火藥味。
    description_en: |
      Scarred rail targets slide behind frosted shields; gunpowder hangs in the air.
    district: tutorial
    grid_x: 2
    grid_y: -1
    exits:
      south: tutorial_combat
  docks:
    name_zh: 貨櫃碼頭
    name_en: Container Docks
    description_zh: 起重機低鳴，走私貨櫃堆疊至霧中。北邊是霓虹廣場。
    description_en: Cranes groan as smuggler containers vanish into the fog. North leads to the square.
    district: docks
    grid_x: 1
    grid_y: 2
    tags: [vehicle_dealer, transit]
    exits:
      north: square
      down: undercity
  ripper_clinic:
    name_zh: 義體診所
    name_en: Ripper Clinic
    description_zh: 手術燈在霧化玻璃後閃爍。東邊回到霓虹廣場。
    description_en: Surgical lamps flicker behind frosted glass. East leads back to Neon Square.
    district: watson
    grid_x: 0
    grid_y: 1
    tags: [shop, ripperdoc]
    shop_id: ripperdoc
    exits:
      east: square
  watson_flat:
    name_zh: 沃森公寓
    name_en: Watson Flat
    description_zh: |
      你的公寓——狹小但安全。牆上掛著舊海報，角落有個私人儲物櫃（stash）。
      可用 transit 或 drive 往返街區。
    description_en: |
      Your flat—cramped but safe. A stash locker sits in the corner.
      Use transit or drive to reach the district.
    district: watson
    grid_x: 0
    grid_y: 2
    tags: [housing, home]
    exits: {}

items:
  glowstick:
    name_zh: 螢光棒
    name_en: Glowstick
    description_zh: 廉價的化学光源，在酸雨中仍亮得刺眼。
    description_en: A cheap chem-light that burns bright even in acid rain.
    takeable: true
    value: 10
  knife:
    name_zh: 戰術折刀
    name_en: Tactical Knife
    description_zh: 街頭常見的折刀，刃口磨得發亮。
    description_en: A common street knife with a keen edge.
    takeable: true
    slot: weapon
    weapon_type: blade
    weapon_class: melee
    weapon_mode: dual_wield
    weapon_damage: 5
    value: 80
  liberty_pistol:
    name_zh: 自由型手槍
    name_en: Liberty Pistol
    description_zh: 夜城最常見的廉價手槍，膛線磨損但還能開火。
    description_en: A cheap Night City sidearm—worn rifling, still lethal.
    takeable: true
    slot: weapon
    weapon_type: handgun
    weapon_class: power
    weapon_mode: secondary
    weapon_damage: 9
    value: 150
  pipe:
    name_zh: 強化水管
    name_en: Reinforced Pipe
    description_zh: 從工地順來的鋼管，砸人很痛。
    description_en: A scavenged steel pipe that hits hard.
    takeable: true
    slot: weapon
    weapon_type: blunt
    weapon_class: melee
    weapon_mode: dual_wield
    weapon_damage: 4
    value: 25
  jacket:
    name_zh: 防彈夾克
    name_en: Armored Jacket
    description_zh: 舊款企業防彈夾克，仍擋得住小口徑子彈。
    description_en: An old corpo armored jacket that still stops small-caliber rounds.
    takeable: true
    slot: outer_torso
    defense: 2
    value: 50
  cyber_arm_kit:
    name_zh: 漩渦義肢套件
    name_en: Maelstrom Cyber Arm Kit
    description_zh: 未安裝的義肢臂套件，在義體診所用 install 安裝。
    description_en: An uninstalled cyber-arm kit—install at the ripper clinic.
    takeable: true
    slot: cyber
    implant_id: cyber_arm_v1
    value: 200
  biomon_kit:
    name_zh: 生物監測器套件
    name_en: Biomonitor Kit
    description_zh: 心血管義體套件，install 裝入。
    description_en: Cardiovascular implant kit—use install.
    takeable: true
    slot: cyber
    implant_id: biomon
    value: 180
  kerenzikov_kit:
    name_zh: 克倫尼科夫套件
    name_en: Kerenzikov Kit
    description_zh: 神經加速義體，僅能於義體診所 install。
    description_en: Neural accelerator kit—install at the ripper clinic.
    takeable: true
    slot: cyber
    implant_id: kerenzikov
    value: 450
  neural_link_kit:
    name_zh: 神經連結套件
    name_en: Neural Link Kit
    description_zh: 腦機介面擴容套件，僅能於義體診所 install。
    description_en: Neural link kit—install at the ripper clinic.
    takeable: true
    slot: cyber
    implant_id: neural_link
    value: 520
  mod_chip:
    name_zh: 智慧連結晶片
    name_en: Smart Link Chip
    description_zh: 可安裝於武器的戰術晶片，提升火力。
    description_en: A tactical chip that boosts weapon damage when installed.
    takeable: true
    value: 120
  trainee_blade:
    name_zh: 訓練用短刀
    name_en: Training Blade
    description_zh: 刃口鈍化的練習刀，仍足以熟悉揮砍節奏。
    description_en: A dulled practice blade—still good for learning slash timing.
    takeable: true
    slot: weapon
    weapon_type: blade
    weapon_class: melee
    weapon_mode: dual_wield
    weapon_damage: 4
    value: 35
  training_sidearm:
    name_zh: 訓練用手槍
    name_en: Training Sidearm
    description_zh: 裝填橡膠彈的教學用槍，後座力較輕。
    description_en: A rubber-round training pistol with mild recoil.
    takeable: true
    slot: weapon
    weapon_type: handgun
    weapon_class: power
    weapon_mode: secondary
    weapon_damage: 7
    value: 60
  training_carbine:
    name_zh: 訓練用卡賓槍
    name_en: Training Carbine
    description_zh: 雙手托擊的教學卡賓槍，裝備時無法同時持握副武器。
    description_en: A two-handed training carbine—you cannot hold an off-hand weapon with it ready.
    takeable: true
    slot: weapon
    weapon_type: assault_rifle
    weapon_class: power
    weapon_mode: two_handed
    weapon_damage: 12
    value: 90
  trainee_undersuit:
    name_zh: 學員貼身戰術服
    name_en: Trainee Undersuit
    description_zh: 內層戰術服，貼合義體接口並提供基礎防護。
    description_en: Inner tactical layer wired for cyberware ports.
    takeable: true
    slot: inner_torso
    defense: 1
    value: 25
  trainee_vest:
    name_zh: 學員護甲背心
    name_en: Trainee Vest
    description_zh: 輕量複合纖維背心，能擋住訓練用鈍器。
    description_en: Light composite weave that stops training-grade impacts.
    takeable: true
    slot: outer_torso
    defense: 1
    value: 40
  trainee_pants:
    name_zh: 學員戰術長褲
    name_en: Trainee Tac Pants
    description_zh: 耐磨複合纖維長褲，訓練場標準下身裝備。
    description_en: Reinforced tac pants—standard lower-body kit for rookies.
    takeable: true
    slot: legs
    defense: 1
    value: 30
  trainee_boots:
    name_zh: 學員戰術靴
    name_en: Trainee Tac Boots
    description_zh: 防滑複合底戰術靴，長時間站立仍舒適。
    description_en: Composite-soled tac boots built for long shifts on the yard.
    takeable: true
    slot: feet
    defense: 1
    value: 25
  trainee_helmet:
    name_zh: 學員戰術頭盔
    name_en: Trainee Tac Helmet
    description_zh: 帶 HUD 投影的入門頭盔，保護與教學並重。
    description_en: An entry-level tac helmet with a basic HUD overlay.
    takeable: true
    slot: head
    defense: 1
    value: 45
  trainee_baton:
    name_zh: 訓練用警棍
    name_en: Training Baton
    description_zh: 包膠的練習棍，陪練機械人的預設武器。
    description_en: A rubber-wrapped practice stick—the sparring drone's default weapon.
    takeable: true
    slot: weapon
    weapon_type: blunt
    weapon_class: melee
    weapon_mode: dual_wield
    weapon_damage: 3
    value: 20
  practice_cyber_kit:
    name_zh: 入門義肢套件
    name_en: Practice Cyber Kit
    description_zh: 訓練場提供的義肢臂示範套件，可安全安裝體驗。
    description_en: A demo cyber-arm kit from the yard—safe to install for practice.
    takeable: true
    slot: cyber
    implant_id: cyber_arm_v1
    value: 100
  med_stim:
    name_zh: 急救興奮劑
    name_en: Med Stim
    description_zh: 單劑戰地興奮劑，訓練場常見的補給品。
    description_en: A single-dose combat stim—common training-yard supply.
    takeable: true
    consumable: medicine
    hp_restore: 30
    value: 25
  trainee_ration:
    name_zh: 學員口糧包
    name_en: Trainee Ration Pack
    description_zh: 企業配發的壓縮口糧，熱量足夠撐過一場模擬戰。
    description_en: Corporate-issue calorie bricks—enough for one sim firefight.
    takeable: true
    consumable: food
    hp_restore: 12
    value: 8
  trainee_flask:
    name_zh: 學員電解液
    name_en: Trainee Electrolyte Flask
    description_zh: 訓練場標準飲料，可短暫恢復神經負載（RAM）。
    description_en: Standard yard hydration—a brief neural (RAM) bump.
    takeable: true
    consumable: drink
    hp_restore: 4
    ram_restore: 1
    value: 10
  field_manual:
    name_zh: 邊緣人戰術手冊
    name_en: Edgerunner Field Manual
    description_zh: 訓練場配發的口袋手冊，封面寫著「先 look，再出手」。
    description_en: A pocket manual from the yard—cover reads "look first, then act."
    takeable: true
    value: 5
  training_smartgun:
    name_zh: 訓練用智慧手槍
    name_en: Training Smart Pistol
    description_zh: 鎖定輔助示範槍，熟悉 smart 武器種類與射擊節奏。
    description_en: A lock-on demo pistol—learn smart weapons and firing cadence.
    takeable: true
    slot: weapon
    weapon_type: handgun
    weapon_class: smart
    weapon_mode: secondary
    weapon_damage: 8
    value: 75
  rusty_key:
    name_zh: 生鏽鑰匙
    name_en: Rusty Key
    description_zh: 走私貨櫃的舊鑰匙，齒痕磨損但仍能轉動。
    description_en: A worn smuggler-cache key—the teeth are ground down but it still turns.
    takeable: true
    value: 5
  synth_ramen:
    name_zh: 合成拉麵
    name_en: Synth Ramen
    description_zh: 微波即食的合成麵，熱湯能讓僵硬的身體鬆開。
    description_en: Instant synth noodles—the hot broth loosens stiff muscles.
    takeable: true
    consumable: food
    hp_restore: 15
    value: 12
  energy_drink:
    name_zh: 神經能量飲
    name_en: Neural Energy Drink
    description_zh: 高糖咖啡因與微量神經刺激劑，讓 RAM 暫時回升。
    description_en: Caffeine and neural boosters—a short RAM spike.
    takeable: true
    consumable: drink
    hp_restore: 5
    ram_restore: 2
    value: 18
  synth_coffee:
    name_zh: 合成咖啡
    name_en: Synth Coffee
    description_zh: 廉價即溶咖啡，夜城夜班族的救命稻草。
    description_en: Cheap instant coffee—lifeline for Night City night shifts.
    takeable: true
    consumable: drink
    ram_restore: 1
    value: 8
  trauma_kit:
    name_zh: 創傷急救包
    name_en: Trauma Kit
    description_zh: ripperdoc 櫃台常備的進階急救包，能大幅穩定生命徵象。
    description_en: A ripperdoc-grade trauma kit that stabilizes vitals fast.
    takeable: true
    consumable: medicine
    hp_restore: 50
    value: 60

npcs:
  broker:
    name_zh: 情報經紀人
    name_en: Info Broker
    room_id: square
    motivation: trade
    description_zh: 半張臉藏在全息面具後，低聲兜售傳聞與座標。
    description_en: Half a face hides behind a holo-mask, whispering rumors and coordinates.
    hp: 50
    hostile: false
    patrol: [square, alley]
    schedule:
      morning: square
      afternoon: alley
      night: square
    idle_msg_zh: 低聲對著空氣嘀咕著價碼。
    idle_msg_en: Mumbles prices to no one in particular.
    talk_key: broker
    quest_id: broker_rumor
  thug:
    name_zh: 街頭暴徒
    name_en: Street Thug
    room_id: alley
    faction: maelstrom
    motivation: hunt_rival
    description_zh: 義體手臂上的刀刃在霓虹下反光。
    description_en: Blades on a cyber-arm catch the neon glare.
    hp: 30
    attack: 4
    hostile: true
    aggro: 8
    patrol: [alley, square]
    quest_id: broker_rumor
    equipment:
      weapon_secondary: knife
    loot: [mod_chip]
  corp_scout:
    name_zh: 企業偵察員
    name_en: Corpo Scout
    room_id: square
    description_zh: 荒坂外包偵察員，義眼不停掃描路人識別碼。
    description_en: An Arasaka contractor—cyber eyes scanning every passerby.
    faction: arasaka
    motivation: guard
    hp: 35
    max_hp: 35
    attack: 5
    hostile: false
    patrol: [square, alley]
    idle_msg_zh: 低聲回報巡邏座標給中控。
    idle_msg_en: Murmurs patrol coordinates to central dispatch.
  instructor:
    name_zh: 訓練教官
    name_en: Drill Instructor
    room_id: tutorial
    description_zh: 全息教官反覆示範移動、察看與撿取物品的標準流程。
    description_en: A holo instructor demos movement, looking, and looting by the book.
    hp: 80
    hostile: false
    talk_key: instructor
    idle_msg_zh: 「記住：先 look，再決定下一步。」
    idle_msg_en: "\"Remember: look first, then decide.\""
  netcoach:
    name_zh: 駭客教練
    name_en: Net Coach
    room_id: tutorial_net
    description_zh: 眼窩嵌著資料線的教練，監控訓練終端的入侵模擬。
    description_en: A coach with data jacks under the eyes, watching the sim terminals.
    hp: 60
    hostile: false
    talk_key: netcoach
    idle_msg_zh: 低聲念著 RAM 配額與協定清單。
    idle_msg_en: Mutters RAM quotas and protocol lists.
  quartermaster:
    name_zh: 裝備管理員
    name_en: Quartermaster
    room_id: tutorial_armory
    description_zh: 手臂上貼滿庫存條碼的管理員，催促新人領取訓練裝備。
