start_room: square
respawn_room: ripper_clinic

factions:
  arasaka: 荒坂公司
  maelstrom: 漩渦幫
  militech: 軍武科技
  tyrell: 泰瑞公司

room_items:
  square: [glowstick, knife, jacket, cyber_arm_kit, mod_chip, liberty_pistol, pipe, synth_ramen]
  alley: [rusty_key]
  kabuki_bazaar: [glowstick, synth_coffee]
  shrine: [lantern]
  data_crypt: [rusty_key]
  tutorial: [glowstick, field_manual]
  tutorial_briefing: [field_manual]
  tutorial_armory: [trainee_blade, training_sidearm, trainee_undersuit, trainee_vest, trainee_pants, trainee_boots, trainee_helmet, trainee_baton, practice_cyber_kit, mod_chip, med_stim]
  tutorial_canteen: [trainee_ration, trainee_flask, synth_ramen, energy_drink, med_stim]
  tutorial_course: [field_manual, trainee_baton]
  tutorial_medbay: [practice_cyber_kit, med_stim, trauma_kit]
  tutorial_range: [training_sidearm, training_carbine, trainee_helmet, training_smartgun]

rooms:
  square:
    name_zh: 霓虹廣場
    name_en: Neon Square
    description_zh: |
      全息廣告在酸雨後的積水上閃爍。情報販子與企業特工混雜在人群中。
    description_en: |
      Holographic ads flicker on rain-slick pavement. Fixers and corpo agents mingle in the crowd.
    district: watson
    grid_x: 1
    grid_y: 1
    tags: [transit, metro]
    exits:
      north: alley
      east: tutorial
      south: docks
      west: ripper_clinic
      up: square_rooftop
  alley:
    name_zh: 陰暗小巷
    name_en: Dark Alley
    description_zh: 霓虹反光在潮濕牆面上流動。南邊回到廣場。
    description_en: Neon reflections crawl across wet walls. South leads back to the square.
    district: watson
    grid_x: 1
    grid_y: 0
    hidden_hint_zh: 牆縫裡似乎藏著走私貨櫃的密碼。
    hidden_hint_en: A smuggler cache password seems hidden in the wall seam.
    exits:
      south: square
      down: undercity
      west: kabuki_lounge
      east: little_china_gate
  kabuki_lounge:
    name_zh: 歌舞伎夜總會
    name_en: Kabuki Lounge
    description_zh: |
      霓虹簾幕後傳來合成爵士與低語。這裡只接待已確認年齡的客人。
    description_en: |
      Synthetic jazz and whispers behind neon curtains. Patrons must confirm they are 18+.
    district: kabuki
    grid_x: 0
    grid_y: 0
    tags: [mature, club, lounge, rest]
    exits:
      east: alley
      west: kabuki_bazaar
      north: kabuki_vip
  kabuki_vip:
    name_zh: VIP 包廂區
    name_en: VIP Booth Wing
    description_zh: |
      隱私場與腦舞預覽艙被絨簾隔開。保鑣的義眼掃過每一位進場者。
    description_en: |
      Privacy fields and BD preview pods sit behind velvet curtains. A bouncer's cyber-eye tracks every entrant.
    district: kabuki
    grid_x: 0
    grid_y: 1
    tags: [mature, club]
    exits:
      south: kabuki_lounge
  kabuki_bazaar:
    name_zh: 歌舞伎灰市
    name_en: Kabuki Gray Bazaar
    description_zh: |
      攤販兜售改裝晶片與來路不明的情報。東邊是夜總會，南邊通往小中國街。
    description_en: |
      Stalls hawk mod chips and questionable intel. East to the lounge; south to Little China Gate.
    district: kabuki
    grid_x: -1
    grid_y: 0
    tags: [bazaar, shop]
    shop_id: kabuki_bazaar
    exits:
      east: kabuki_lounge
      south: little_china_gate
  little_china_gate:
    name_zh: 小中國街牌樓
    name_en: Little China Gate
    description_zh: |
      紅色牌樓下香火與合成雨味交織。東邊通往廟宇，西邊回到小巷。
    description_en: |
      Incense and synthetic rain mix under a red arch. East to the shrine; west to the alley.
    district: little_china
    grid_x: 2
    grid_y: 0
    exits:
      north: kabuki_bazaar
      east: shrine
      west: alley
  shrine:
    name_zh: 霓虹神社
    name_en: Neon Shrine
    description_zh: |
      全息燭火在傳統木柱間飄動。人性與信仰在義體時代顯得格外脆弱。
    description_en: |
      Holo candles drift between wooden pillars—faith feels fragile in the chrome age.
    district: little_china
    grid_x: 3
    grid_y: 0
    tags: [shrine]
    exits:
      west: little_china_gate
      down: data_crypt
  data_crypt:
    name_zh: 資料墓穴
    name_en: Data Crypt
    description_zh: |
      積水的伺服器機櫃閃著錯誤代碼。北邊可回到地下廢墟。
    description_en: |
      Flooded server racks blink error codes. North leads back to the undercity ruins.
    district: undercity
    grid_x: 3
    grid_y: -1
    tags: [undercity, net]
    exits:
      up: shrine
      north: undercity
  square_rooftop:
    name_zh: 廣場屋頂
    name_en: Square Rooftop
    description_zh: 霓虹燈管在腳下嗡鳴，夜城天際線一覽無遺。
    description_en: Neon hums underfoot—the skyline spreads before you.
    district: watson
    grid_x: 1
    grid_y: 1
    tags: [rooftop]
    exits:
      down: square
  undercity:
    name_zh: 地下廢墟
    name_en: Undercity Ruins
    description_zh: 積水與電纜交織的地下層，腦舞艙與資料墓穴的入口。
    description_en: Flooded tunnels and cables—the BD booths and data crypts begin here.
    district: undercity
    grid_x: 1
    grid_y: -1
    tags: [undercity]
    exits:
      up: alley
      north: docks
      east: bd_den
      south: data_crypt
  bd_den:
    name_zh: 地下腦舞密艙
    name_en: Underground BD Den
    description_zh: |
      隔間裡的腦舞艙覆著汗漬與消毒水味。櫃台貼著「18+ 限定」全息標籤。
    description_en: |
      Booths reek of sanitizer and sweat. A holo sticker reads "18+ only."
    district: undercity
    grid_x: 2
    grid_y: -1
    tags: [mature, braindance]
    exits:
      west: undercity
  tutorial:
    name_zh: 新手訓練場
    name_en: Training Yard
    description_zh: |
      教官的全息投影正在等待新進邊緣人。這裡是訓練場中樞。
    description_en: |
      An instructor holo waits for new edgerunners. This is the training hub.
    district: tutorial
    grid_x: 2
    grid_y: 1
    exits:
      west: square
      up: tutorial_briefing
      north: tutorial_combat
      east: tutorial_net
      south: tutorial_armory
  tutorial_briefing:
    name_zh: 任務簡報室
    name_en: Mission Briefing Room
    description_zh: |
      全息委託板與派系簡介投影循環播放。新手可在這裡熟悉 gigs、stats 與 recall。
    description_en: |
      Holo gig boards and faction primers loop on the walls—learn gigs, stats, and recall here.
    district: tutorial
    grid_x: 2
    grid_y: 2
    tags: [tutorial, social]
    exits:
      down: tutorial
  tutorial_combat:
    name_zh: 戰鬥訓練區
    name_en: Combat Drill Zone
    description_zh: |
      軟墊與全息標靶覆蓋地面，陪練機械人發出單調的待機嗡鳴。
    description_en: |
      Padded mats and holo targets cover the floor. A sparring drone hums on standby.
    district: tutorial
    grid_x: 2
    grid_y: 0
    exits:
      south: tutorial
      north: tutorial_range
      east: tutorial_course
  tutorial_course:
    name_zh: 障礙訓練道
    name_en: Obstacle Course
    description_zh: |
      掃描信標與互動閘門排列成基礎課程。東側靶標機供額外戰鬥練習。
    description_en: |
      Scan beacons and interact gates line a basic drill lane—with extra combat targets at the end.
    district: tutorial
    grid_x: 3
    grid_y: 0
    tags: [tutorial, interact]
    exits:
      west: tutorial_combat
  tutorial_net:
    name_zh: 駭客模擬區
    name_en: Netrun Sim Bay
    description_zh: |
      隔離的訓練終端閃爍綠色字元，教練監看著你的 RAM 消耗。
    description_en: |
      Isolated training terminals flicker green glyphs while a coach watches your RAM drain.
    district: tutorial
    grid_x: 3
    grid_y: 1
    exits:
      west: tutorial
      north: tutorial_medbay
  tutorial_medbay:
    name_zh: 模擬義體診所
    name_en: Sim Ripper Bay
    description_zh: |
      無菌霧面隔間與示範手術燈。可在這裡練習 install、use 與義體槽位概念（安全模擬）。
    description_en: |
      Sterile booths and demo surgical lamps—practice install, use, and cyber slots in a safe sim.
    district: tutorial
    grid_x: 3
    grid_y: 2
    tags: [tutorial, ripperdoc]
    exits:
      south: tutorial_net
  tutorial_armory:
    name_zh: 訓練裝備庫
    name_en: Training Armory
    description_zh: |
      企業贊助的訓練武器與護具整齊掛在架上，供新人試用。
    description_en: |
      Corporate-sponsored training weapons and armor hang ready for rookies to try.
    district: tutorial
    grid_x: 2
    grid_y: 2
    exits:
      north: tutorial
      west: tutorial_canteen
  tutorial_canteen:
    name_zh: 學員餐廳
    name_en: Trainee Canteen
    description_zh: |
      合成餐與能量飲的自動販賣機嗡嗡運轉。適合練習 eat、drink、use 與補給管理。
    description_en: |
      Synth-food dispensers hum—practice eat, drink, use, and supply management here.
    district: tutorial
    grid_x: 1
    grid_y: 2
    tags: [tutorial, consumables, rest, safe]
    exits:
      east: tutorial_armory
  tutorial_range:
    name_zh: 射擊靶場
    name_en: Firing Range
    description_zh: |
      彈痕累累的軌道靶在霧面護盾後滑動，空氣裡殘留火藥味。
    description_en: |
      Scarred rail targets slide behind frosted shields; gunpowder hangs in the air.
    district: tutorial
    grid_x: 2
    grid_y: -1
    exits:
      south: tutorial_combat
  docks:
    name_zh: 貨櫃碼頭
    name_en: Container Docks
    description_zh: 起重機低鳴，走私貨櫃堆疊至霧中。北邊是霓虹廣場。
    description_en: Cranes groan as smuggler containers vanish into the fog. North leads to the square.
    district: docks
    grid_x: 1
    grid_y: 2
    tags: [vehicle_dealer, transit]
    exits:
      north: square
      down: undercity
  ripper_clinic:
    name_zh: 義體診所
    name_en: Ripper Clinic
    description_zh: 手術燈在霧化玻璃後閃爍。東邊回到霓虹廣場。
    description_en: Surgical lamps flicker behind frosted glass. East leads back to Neon Square.
    district: watson
    grid_x: 0
    grid_y: 1
    tags: [shop, ripperdoc, clinic, rest, safe]
    shop_id: ripperdoc
    exits:
      east: square
      west: corpo_lobby
  corpo_lobby:
    name_zh: 企業大廳
    name_en: Corporate Lobby
    description_zh: |
      冷色大理石與武裝保全。東邊是義體診所，西邊通往企業廣場。
    description_en: |
      Cold marble and armed security. East to the ripper clinic; west to the corpo plaza.
    district: corpo
    grid_x: -1
    grid_y: 1
    exits:
      east: ripper_clinic
      west: corpo_plaza
  corpo_plaza:
    name_zh: 企業廣場
    name_en: Corpo Plaza
    description_zh: |
      全息企業標誌在酸雨中旋轉。荒坂與軍武的勢力在這裡交錯。
    description_en: |
      Holo corporate logos spin in acid rain—Arasaka and Militech influence collides here.
    district: corpo
    grid_x: -2
    grid_y: 1
    tags: [corpo, transit]
    exits:
      east: corpo_lobby
  watson_flat:
    name_zh: 沃森公寓
    name_en: Watson Flat
    description_zh: |
      你的公寓——狹小但安全。牆上掛著舊海報，角落有個私人儲物櫃（stash）。
      可用 transit 或 drive 往返街區。
    description_en: |
      Your flat—cramped but safe. A stash locker sits in the corner.
      Use transit or drive to reach the district.
    district: watson
    grid_x: 0
    grid_y: 2
    tags: [housing, home, rest, safe]
    exits: {}

items:
  lantern:
    name_zh: 紙燈籠
    name_en: Paper Lantern
    description_zh: 小中國街常見的紙燈籠，在霓虹下仍顯得溫暖。
    description_en: A paper lantern—warm against the neon cold of Little China.
    takeable: true
    value: 12
  glowstick:
    name_zh: 螢光棒
    name_en: Glowstick
    description_zh: 廉價的化学光源，在酸雨中仍亮得刺眼。
    description_en: A cheap chem-light that burns bright even in acid rain.
    takeable: true
    value: 10
  knife:
    name_zh: 戰術折刀
    name_en: Tactical Knife
    description_zh: 街頭常見的折刀，刃口磨得發亮。
    description_en: A common street knife with a keen edge.
    takeable: true
    slot: weapon
    weapon_type: blade
    weapon_class: melee
    weapon_mode: dual_wield
    weapon_damage: 5
    value: 80
  liberty_pistol:
    name_zh: 自由型手槍
    name_en: Liberty Pistol
    description_zh: 夜城最常見的廉價手槍，膛線磨損但還能開火。
    description_en: A cheap Night City sidearm—worn rifling, still lethal.
    takeable: true
    slot: weapon
    weapon_type: handgun
    weapon_class: power
    weapon_mode: secondary
    weapon_damage: 9
    value: 150
  pipe:
    name_zh: 強化水管
    name_en: Reinforced Pipe
    description_zh: 從工地順來的鋼管，砸人很痛。
    description_en: A scavenged steel pipe that hits hard.
    takeable: true
    slot: weapon
    weapon_type: blunt
    weapon_class: melee
    weapon_mode: dual_wield
    weapon_damage: 4
    value: 25
  jacket:
    name_zh: 防彈夾克
    name_en: Armored Jacket
    description_zh: 舊款企業防彈夾克，仍擋得住小口徑子彈。
    description_en: An old corpo armored jacket that still stops small-caliber rounds.
    takeable: true
    slot: outer_torso
    defense: 2
    value: 50
  cyber_arm_kit:
    name_zh: 漩渦義肢套件
    name_en: Maelstrom Cyber Arm Kit
    description_zh: 未安裝的義肢臂套件，在義體診所用 install 安裝。
    description_en: An uninstalled cyber-arm kit—install at the ripper clinic.
    takeable: true
    slot: cyber
    implant_id: cyber_arm_v1
    value: 200
  biomon_kit:
    name_zh: 生物監測器套件
    name_en: Biomonitor Kit
    description_zh: 心血管義體套件，install 裝入。
    description_en: Cardiovascular implant kit—use install.
    takeable: true
    slot: cyber
    implant_id: biomon
    value: 180
  kerenzikov_kit:
    name_zh: 克倫尼科夫套件
    name_en: Kerenzikov Kit
    description_zh: 神經加速義體，僅能於義體診所 install。
    description_en: Neural accelerator kit—install at the ripper clinic.
    takeable: true
    slot: cyber
    implant_id: kerenzikov
    value: 450
  neural_link_kit:
    name_zh: 神經連結套件
    name_en: Neural Link Kit
    description_zh: 腦機介面擴容套件，僅能於義體診所 install。
    description_en: Neural link kit—install at the ripper clinic.
    takeable: true
    slot: cyber
    implant_id: neural_link
    value: 520
  mod_chip:
    name_zh: 智慧連結晶片
    name_en: Smart Link Chip
    description_zh: 可安裝於武器的戰術晶片，提升火力。
    description_en: A tactical chip that boosts weapon damage when installed.
    takeable: true
    value: 120
  trainee_blade:
    name_zh: 訓練用短刀
    name_en: Training Blade
    description_zh: 刃口鈍化的練習刀，仍足以熟悉揮砍節奏。
    description_en: A dulled practice blade—still good for learning slash timing.
    takeable: true
    slot: weapon
    weapon_type: blade
    weapon_class: melee
    weapon_mode: dual_wield
    weapon_damage: 4
    value: 35
  training_sidearm:
    name_zh: 訓練用手槍
    name_en: Training Sidearm
    description_zh: 裝填橡膠彈的教學用槍，後座力較輕。
    description_en: A rubber-round training pistol with mild recoil.
    takeable: true
    slot: weapon
    weapon_type: handgun
    weapon_class: power
    weapon_mode: secondary
    weapon_damage: 7
    value: 60
  training_carbine:
    name_zh: 訓練用卡賓槍
    name_en: Training Carbine
    description_zh: 雙手托擊的教學卡賓槍，裝備時無法同時持握副武器。
    description_en: A two-handed training carbine—you cannot hold an off-hand weapon with it ready.
    takeable: true
    slot: weapon
    weapon_type: assault_rifle
    weapon_class: power
    weapon_mode: two_handed
    weapon_damage: 12
    value: 90
  trainee_undersuit:
    name_zh: 學員貼身戰術服
    name_en: Trainee Undersuit
    description_zh: 內層戰術服，貼合義體接口並提供基礎防護。
    description_en: Inner tactical layer wired for cyberware ports.
    takeable: true
    slot: inner_torso
    defense: 1
    value: 25
  trainee_vest:
    name_zh: 學員護甲背心
    name_en: Trainee Vest
    description_zh: 輕量複合纖維背心，能擋住訓練用鈍器。
    description_en: Light composite weave that stops training-grade impacts.
    takeable: true
    slot: outer_torso
    defense: 1
    value: 40
  trainee_pants:
    name_zh: 學員戰術長褲
    name_en: Trainee Tac Pants
    description_zh: 耐磨複合纖維長褲，訓練場標準下身裝備。
    description_en: Reinforced tac pants—standard lower-body kit for rookies.
    takeable: true
    slot: legs
    defense: 1
    value: 30
  trainee_boots:
    name_zh: 學員戰術靴
    name_en: Trainee Tac Boots
    description_zh: 防滑複合底戰術靴，長時間站立仍舒適。
    description_en: Composite-soled tac boots built for long shifts on the yard.
    takeable: true
    slot: feet
    defense: 1
    value: 25
  trainee_helmet:
    name_zh: 學員戰術頭盔
    name_en: Trainee Tac Helmet
    description_zh: 帶 HUD 投影的入門頭盔，保護與教學並重。
    description_en: An entry-level tac helmet with a basic HUD overlay.
    takeable: true
    slot: head
    defense: 1
    value: 45
  trainee_baton:
    name_zh: 訓練用警棍
    name_en: Training Baton
    description_zh: 包膠的練習棍，陪練機械人的預設武器。
    description_en: A rubber-wrapped practice stick—the sparring drone's default weapon.
    takeable: true
    slot: weapon
    weapon_type: blunt
    weapon_class: melee
    weapon_mode: dual_wield
    weapon_damage: 3
    value: 20
  practice_cyber_kit:
    name_zh: 入門義肢套件
    name_en: Practice Cyber Kit
    description_zh: 訓練場提供的義肢臂示範套件，可安全安裝體驗。
    description_en: A demo cyber-arm kit from the yard—safe to install for practice.
    takeable: true
    slot: cyber
    implant_id: cyber_arm_v1
    value: 100
  med_stim:
    name_zh: 急救興奮劑
    name_en: Med Stim
    description_zh: 單劑戰地興奮劑，訓練場常見的補給品。
    description_en: A single-dose combat stim—common training-yard supply.
    takeable: true
    consumable: medicine
    hp_restore: 30
    value: 25
  trainee_ration:
    name_zh: 學員口糧包
    name_en: Trainee Ration Pack
    description_zh: 企業配發的壓縮口糧，熱量足夠撐過一場模擬戰。
    description_en: Corporate-issue calorie bricks—enough for one sim firefight.
    takeable: true
    consumable: food
    hp_restore: 12
    value: 8
  trainee_flask:
    name_zh: 學員電解液
    name_en: Trainee Electrolyte Flask
    description_zh: 訓練場標準飲料，可短暫恢復神經負載（RAM）。
    description_en: Standard yard hydration—a brief neural (RAM) bump.
    takeable: true
    consumable: drink
    hp_restore: 4
    ram_restore: 1
    value: 10
  field_manual:
    name_zh: 邊緣人戰術手冊
    name_en: Edgerunner Field Manual
    description_zh: 訓練場配發的口袋手冊，封面寫著「先 look，再出手」。
    description_en: A pocket manual from the yard—cover reads "look first, then act."
    takeable: true
    value: 5
  training_smartgun:
    name_zh: 訓練用智慧手槍
