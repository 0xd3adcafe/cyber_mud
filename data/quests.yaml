quests:
  broker_rumor:
    name_zh: 經紀人的傳聞
    name_en: Broker's Rumor
    npc_id: broker
    description_zh: 情報經紀人提到小巷裡有漩渦幫的動向，值得親自確認。
    description_en: The info broker mentioned Maelstrom activity in the alley—worth checking out.
    hint_zh: 到小巷找街頭暴徒打聽消息。
    hint_en: Head to the alley and question the street thug.
    objective_type: talk_npc
    objective_target: thug
    complete_npc_id: broker
    reward_gold: 50
    reward_xp: 25
    reward_street_cred: 10
  dock_watch:
    name_zh: 碼頭監視
    name_en: Dock Surveillance
    npc_id: broker
    description_zh: 經紀人委託你調查碼頭今晚的軍武貨櫃動向。
    description_en: The broker wants intel on tonight's Militech container at the docks.
    hint_zh: 前往貨櫃碼頭調查起重機排程。
    hint_en: Scout the container crane schedule at the docks.
    complete_npc_id: broker
    street_cred_req: 5
    reward_gold: 75
    reward_xp: 40
    reward_street_cred: 8
    stages:
      - objective_type: visit_room
        objective_target: docks
      - objective_type: interact
        objective_target: dock_crane
      - objective_type: talk_npc
        objective_target: broker
  hack_core:
    name_zh: 核心終端入侵
    name_en: Core Terminal Breach
    npc_id: broker
    description_zh: 經紀人要你證明能駭入廣場核心終端——先撿螢光棒、再回報他，最後在 NETRUN 中 hack terminal。
    description_en: The broker wants proof you can breach the plaza core terminal—grab a glowstick, check in, then hack terminal in NETRUN.
    hint_zh: 在廣場撿螢光棒，與經紀人交談，輸入 net 後 hack terminal。
    hint_en: Take a glowstick at the square, talk to the broker, type net, then hack terminal.
    complete_npc_id: broker
    requires_quest: broker_rumor
    reward_gold: 75
    reward_xp: 35
    reward_street_cred: 12
    stages:
      - objective_type: have_item
        objective_target: glowstick
      - objective_type: talk_npc
        objective_target: broker
      - objective_type: hack_net
        objective_target: terminal
  tyrell_intel:
    name_zh: 泰瑞情報投遞
    name_en: Tyrell Intel Drop
    npc_id: broker
    description_zh: 宣誓泰瑞後，經紀人要你從企業保全取得實驗室座標並前往泰瑞廣場。
    description_en: After pledging Tyrell, the broker wants corpo guard coordinates and a visit to Tyrell Plaza.
    hint_zh: pledge tyrell，與企業保全交談，再前往 tyrell_plaza。
    hint_en: pledge tyrell, talk to the corpo guard, then visit tyrell_plaza.
    complete_npc_id: broker
    requires_quest: hack_core
    requires_faction: tyrell
    reward_gold: 120
    reward_xp: 50
    reward_street_cred: 15
    stages:
      - objective_type: talk_npc
        objective_target: corp_guard
      - objective_type: visit_room
        objective_target: tyrell_plaza
      - objective_type: talk_npc
        objective_target: broker
  gray_market:
    name_zh: 灰市憑證
    name_en: Gray Market Proof
    npc_id: broker
    description_zh: 經紀人要碼頭灰市的走私憑證——向走私客打聽後帶 mod_chip 給他。
    description_en: The broker wants proof from the docks gray market—talk to the smuggler, then bring him a mod chip.
    hint_zh: 到碼頭找走私客，購買 mod_chip，再 give mod_chip broker。
    hint_en: Visit the docks smuggler, buy a mod_chip, then give mod_chip broker.
    complete_npc_id: broker
    requires_quest: broker_rumor
    street_cred_req: 2
    reward_gold: 60
    reward_xp: 30
    reward_street_cred: 8
    stages:
      - objective_type: visit_room
        objective_target: docks
      - objective_type: talk_npc
        objective_target: dock_smuggler
      - objective_type: have_item
        objective_target: mod_chip
      - objective_type: give_npc
        objective_target: broker
        objective_item: mod_chip
      - objective_type: talk_npc
        objective_target: broker
  alley_clearance:
    name_zh: 小巷清剿
    name_en: Alley Clearance
    npc_id: broker
    description_zh: 經紀人要你「說服」小巷暴徒別再騷擾他的線人。
    description_en: The broker wants the alley thug off his informants—permanently.
    hint_zh: 在小巷擊倒街頭暴徒。
    hint_en: Take down the street thug in the alley.
    complete_npc_id: broker
    requires_quest: broker_rumor
    street_cred_req: 3
    reward_gold: 100
    reward_xp: 50
    reward_street_cred: 5
    reward_items: [med_stim]
    stages:
      - objective_type: defeat_npc
        objective_target: thug
  hub_briefing:
    name_zh: 樞紐座標
    name_en: Hub Coordinates
    npc_id: broker
    description_zh: 經紀人要你向各區界碑與樞紐確認巡邏座標，再回報他。
    description_en: The broker wants patrol coordinates from district gates and hubs—then report back.
    hint_zh: 與戰鬥區界碑守衛、泰瑞聯絡員交談，再 talk broker 交件。
    hint_en: Talk to the zone warden and Tyrell liaison, then check in with the broker.
    complete_npc_id: broker
    requires_quest: broker_rumor
    street_cred_req: 4
    reward_gold: 80
    reward_xp: 35
    reward_street_cred: 6
    stages:
      - objective_type: talk_npc
        objective_target: zone_warden
      - objective_type: visit_room
        objective_target: tyrell_plaza
      - objective_type: talk_npc
        objective_target: tyrell_liaison
      - objective_type: talk_npc
        objective_target: broker
  watson_pulse:
    name_zh: 沃森脈動
    name_en: Watson Pulse
    npc_id: broker
    description_zh: 經紀人要你向沃森線人打聽診所南邊的 cred 流向，再回報他。
    description_en: The broker wants Watson cred-flow intel from the spotter south of the clinic.
    hint_zh: 在 watson_3_2 與沃森線人交談，前往 watson_0_0，再 talk broker。
    hint_en: Talk to the Watson spotter, visit watson_0_0, then check in with the broker.
    complete_npc_id: broker
    requires_quest: broker_rumor
    street_cred_req: 3
    reward_gold: 55
    reward_xp: 28
    reward_street_cred: 5
    stages:
      - objective_type: talk_npc
        objective_target: watson_spotter
      - objective_type: visit_room
        objective_target: watson_0_0
      - objective_type: talk_npc
        objective_target: broker
  docks_courier:
    name_zh: 碼頭快遞
    name_en: Docks Courier
    npc_id: broker
    description_zh: 經紀人要碼頭跑腿的灰市貨單——帶 dock_manifest 回報。
    description_en: The broker wants a gray-market manifest from the docks runner.
    hint_zh: 到 docks_1_1 找碼頭跑腿，取得 dock_manifest，再 talk broker。
    hint_en: Visit docks_1_1, talk to the runner, obtain dock_manifest, then see the broker.
    complete_npc_id: broker
    requires_quest: hub_briefing
    street_cred_req: 4
    reward_gold: 70
    reward_xp: 32
    reward_street_cred: 6
    stages:
      - objective_type: visit_room
        objective_target: docks_1_1
      - objective_type: talk_npc
        objective_target: docks_runner
      - objective_type: have_item
        objective_target: dock_manifest
      - objective_type: talk_npc
        objective_target: broker
  kabuki_whisper:
    name_zh: 歌舞伎耳語
    name_en: Kabuki Whisper
    npc_id: broker
    description_zh: 經紀人要歌舞伎線人確認 VIP 與密艙片段的流向。
    description_en: The broker wants the Kabuki spotter to confirm VIP and den clip traffic.
    hint_zh: 前往 kabuki_2_1 與歌舞伎線人交談，再 talk broker。
    hint_en: Visit kabuki_2_1, talk to the spotter, then report to the broker.
    complete_npc_id: broker
    requires_quest: broker_rumor
    street_cred_req: 4
    reward_gold: 65
    reward_xp: 30
    reward_street_cred: 7
    stages:
      - objective_type: visit_room
        objective_target: kabuki_2_1
      - objective_type: talk_npc
        objective_target: kabuki_spotter
      - objective_type: talk_npc
        objective_target: broker
  tutorial_rotation:
    name_zh: 訓練輪值檢定
    name_en: Training Rotation Drill
    npc_id: rookie_fixer
    description_zh: 實習中介要你完成一輪基礎檢定：簡報、裝備、戰鬥、駭入，再到畢業檢定室蓋章。
    description_en: The rookie fixer wants a full basics rotation—briefing, gear, combat, netrun, then graduate stamp.
    hint_zh: talk instructor；interact 武器架；擊倒陪練機械人；hack 訓練終端；interact 結業台；talk 畢業導師。
    hint_en: talk instructor; interact weapon rack; knock down sparring drone; hack training terminal; interact grad pad; talk graduation warden.
    complete_npc_id: grad_warden
    reward_gold: 50
    reward_xp: 40
    reward_street_cred: 3
    reward_items: [tutorial_badge]
    stages:
      - objective_type: talk_npc
        objective_target: instructor
      - objective_type: interact
        objective_target: tutorial_weapon_rack
      - objective_type: defeat_npc
        objective_target: sparring_bot
      - objective_type: hack_net
        objective_target: tutorial_terminal
      - objective_type: interact
        objective_target: tutorial_grad_pad
      - objective_type: talk_npc
        objective_target: grad_warden
  zone_sweep:
    name_zh: 戰區掃描
    name_en: Zone Sweep
    npc_id: broker
    description_zh: 經紀人要野戰醫回報戰鬥區界碑的穿越紀錄。
    description_en: The broker wants the zone medic's crossing log from the Combat Zone gate.
    hint_zh: 與戰區野戰醫交談，前往 combat_zone_gate，再 talk broker。
    hint_en: Talk to the zone medic, visit combat_zone_gate, then check in with the broker.
    complete_npc_id: broker
    requires_quest: hub_briefing
    street_cred_req: 5
    reward_gold: 90
    reward_xp: 40
    reward_street_cred: 8
    stages:
      - objective_type: talk_npc
        objective_target: zone_medic
      - objective_type: visit_room
        objective_target: combat_zone_gate
      - objective_type: talk_npc
        objective_target: broker