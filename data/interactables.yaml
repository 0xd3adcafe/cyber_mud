interactables:
  plaza_terminal:
    room_id: square
    name_zh: 廣場核心終端
    name_en: Plaza Core Terminal
    description_zh: 企業維護的公共終端，NETRUN 模式下可 hack 核心節點。
    description_en: A corpo-maintained public terminal—hack the core node while in NETRUN.
    message_zh: 終端螢幕閃爍：「輸入 net 進入駭入介面，再 hack terminal。」
    message_en: 'The screen flashes: "Type net to jack in, then hack terminal."'
  holo_ad:
    room_id: square
    name_zh: 全息廣告看板
    name_en: Holo Ad Board
    description_zh: 循環播放企業招募與黑市藥物廣告的全息看板。
    description_en: A holo board cycling corpo recruitment and black-market pharma ads.
    message_zh: 看板閃過一行字：「想升級義體？西邊診所全天候開放。」
    message_en: 'The board flashes: "Chrome upgrades—ripper clinic west, 24/7."'
  vault_terminal:
    room_id: data_vault
    name_zh: 資料庫終端
    name_en: Vault Terminal
    description_zh: 冷卻庫內的企業終端，仍連著廣場核心節點的備援通道。
    description_en: A corporate terminal in the cold vault—backup link to the plaza core node.
    message_zh: 終端顯示：「vault_core 節點待機中——需 breach_protocol。」
    message_en: 'Display reads: "vault_core node standby—breach_protocol recommended."'
  smuggler_cache:
    room_id: alley
    name_zh: 走私貨櫃
    name_en: Smuggler Cache
    description_zh: 牆縫裡的隱藏貨櫃，需要密碼或鑰匙才能開啟。
    description_en: A hidden cache in the wall seam—needs a key or code.
    requires_item: rusty_key
    gives_item: mod_chip
    once_key: smuggler_cache
    message_zh: 你用生鏽鑰匙撬開貨櫃，裡面有一枚戰術晶片。
    message_en: You pry the cache open with the rusty key—a tactical chip inside.
  dock_crane:
    room_id: docks
    name_zh: 貨櫃起重機
    name_en: Container Crane
    description_zh: 生鏽的起重機控制面板，仍可操作。
    description_en: A rusted crane panel—still operational.
    requires_skill: breach_protocol
    message_zh: 你駭入起重機排程，發現今晚有一批軍武貨櫃進港。
    message_en: You breach the crane schedule—a Militech container lands tonight.
  rooftop_antenna:
    room_id: square_rooftop
    name_zh: 訊號天線
    name_en: Signal Antenna
    description_zh: 屋頂上的非法訊號放大器。
    description_en: An illegal signal booster on the rooftop.
    message_zh: 天線捕捉到一段加密廣播：漩渦幫在碼頭集結。
    message_en: "The antenna catches encrypted chatter—Maelstrom gathering at the docks."
  bd_booth:
    room_id: undercity
    name_zh: 腦舞艙
    name_en: BD Booth
    description_zh: 地下廢棄的腦舞體驗艙，接觸不良但還能啟動。
    description_en: A derelict BD booth—shaky but bootable.
    braindance_id: dock_heist
    message_zh: 艙門嘶嘶作響，神經介面等待插入。
    message_en: The booth hisses—neural jacks waiting.
  tutorial_holo_board:
    room_id: tutorial_briefing
    name_zh: 全息委託板
    name_en: Holo Gig Board
    description_zh: 循環播放派系簡介與委託類型的全息板。
    description_en: A holo board cycling faction primers and gig types.
    message_zh: 板上浮現：「gigs 列出委託；accept 後用 journal 追蹤；完成可賺街頭聲望。」
    message_en: 'The board reads: "gigs lists work; accept then journal to track—finish for street cred."'
  canteen_bench:
    room_id: tutorial_canteen
    name_zh: 學員長椅
    name_en: Trainee Bench
    description_zh: 靠牆的複合長椅，適合練習 sit 與 rest。
    description_en: A composite bench along the wall—practice sit and rest here.
    kind: rest
    life_profile: bench
    message_zh: 你坐下，販賣機的嗡鳴變成背景白噪音。
    message_en: You sit—the vending hum fades to background noise.
  flat_bunk:
    room_id: watson_flat
    name_zh: 折疊床
    name_en: Fold-out Bunk
    description_zh: 狹小但乾淨的折疊床，公寓裡最安靜的角落。
    description_en: A cramped but clean fold-out bunk—the quietest corner of your flat.
    kind: sleep
    life_profile: bunk
    message_zh: 床墊收起金屬輕響，夜城的喧囂被擋在門外。
    message_en: The bunk clicks into place—Night City noise stays beyond the door.
  clinic_bed:
    room_id: ripper_clinic
    name_zh: 恢復病床
    name_en: Recovery Bed
    description_zh: 診所角落的監測病床，適合術後靜養。
    description_en: A monitored recovery bed in the clinic corner.
    kind: sleep
    life_profile: bunk
    message_zh: 生命徵象監測儀低聲運轉，液體滴落有節奏地滴答。
    message_en: Vitals monitors hum; IV fluid ticks in rhythm.
  lounge_booth:
    room_id: kabuki_lounge
    name_zh: 絨布卡座
    name_en: Velvet Booth
    description_zh: 半封閉卡座，霓虹簾幕隔開視線。
    description_en: A semi-private booth behind a neon curtain.
    kind: rest
    life_profile: booth
    message_zh: 你陷進卡座，合成爵士蓋過了外面的腳步聲。
    message_en: You sink into the booth—synthetic jazz drowns the footfalls outside.
  tutorial_locker:
    room_id: tutorial_canteen
    name_zh: 學員儲物櫃
    name_en: Trainee Locker
    description_zh: 編號櫃裡還留著一份緊急口糧。
    description_en: A numbered locker with emergency rations inside.
    gives_item: trainee_ration
    once_key: tutorial_locker
    message_zh: 你打開櫃門，取出一包學員口糧。
    message_en: You open the locker and take a trainee ration pack.
  tutorial_scan_post:
    room_id: tutorial_course
    name_zh: 掃描信標柱
    name_en: Scan Beacon Post
    description_zh: 障礙道上的掃描示範柱，綠燈閃爍等待互動。
    description_en: A scan demo post on the course—green light blinking.
    message_zh: 信標亮起：「scan 可列出房間出口、物品與 NPC；練熟後進入夜城。」
    message_en: 'The beacon glows: "scan lists exits, items, and NPCs—master it before Night City."'
  tutorial_med_console:
    room_id: tutorial_medbay
    name_zh: 義體示範主機
    name_en: Cyber Demo Console
    description_zh: 模擬診所的教學終端，顯示義體槽位說明。
    description_en: A sim-clinic teaching terminal showing cyber slot info.
    message_zh: 螢幕列出九個義體槽與 install／uninstall 流程——此處為安全模擬，不會觸發幻痛。
    message_en: "The screen lists nine cyber slots and install/uninstall steps—safe sim, no psychosis."
  tyrell_plaza_scanner:
    room_id: tyrell_plaza
    name_zh: 樣本掃描台
    name_en: Sample Scanner
    description_zh: 泰瑞廣場的樣本加密封條掃描台，連接巡邏路線資料庫。
    description_en: A Tyrell plaza sample seal scanner linked to patrol route databases.
    message_zh: 掃描台顯示：「樣本車 ETA 每小時更新——net 模式下可 probe tyrell_grid_node。」
    message_en: 'The scanner reads: "Convoy ETA updates hourly—probe tyrell_grid_node in NETRUN."'
  zone_gate_memorial:
    room_id: combat_zone_gate
    name_zh: 界碑紀念牌
    name_en: Gate Memorial Plaque
    description_zh: 燒毀界碑旁的紀念牌，刻著戰鬥區大火的日期與失蹤名單。
    description_en: A memorial plaque by the scorched marker—fire dates and missing names from the Zone.
    message_zh: 牌面閃過一行字：「守衛記錄每次穿越——向 zone_warden 報到可換座標。」
    message_en: 'The plaque flashes: "Crossings are logged—check in with the zone warden for coordinates."'
  watson_grid_terminal:
    room_id: watson_0_0
    name_zh: 格點公共終端
    name_en: Grid Public Terminal
    description_zh: 沃森格點邊角的公共終端，維護狀態堪憂但尚可 jack-in。
    description_en: A battered public terminal on the Watson grid corner—still jackable.
    message_zh: 終端提示：「輸入 net，再 hack watson_grid_node 測試連線。」
    message_en: 'Prompt reads: "Type net, then hack watson_grid_node to test the link."'
  docks_container_tag:
    room_id: docks_0_0
    name_zh: 貨櫃識別牌
    name_en: Container ID Tag
    description_zh: 碼頭格點上的生鏽貨櫃識別牌，加密貨單殘留。
    description_en: A rusted container ID tag on the docks grid—encrypted manifest fragments remain.
    message_zh: 識別牌顯示模糊貨單——與 dock_manifest 物品描述吻合。
    message_en: "The tag shows a blurred manifest—matches dock_manifest item lore."
  china_incense_burner:
    room_id: little_china_0_0
    name_zh: 路邊香爐
    name_en: Street Incense Burner
    description_zh: 小中國格點路邊的公共香爐，香火與合成雨味交織。
    description_en: A street incense burner on the Little China grid—synthetic rain and ash mix.
    message_zh: 香爐旁擺著 china_incense 供品——向 gate_herbalist 打聽牌樓藥方。
    message_en: "china_incense offerings sit nearby—ask the gate herbalist about remedies."
  corpo_guest_kiosk:
    room_id: corpo_1_0
    name_zh: 訪客登記機
    name_en: Guest Registry Kiosk
    description_zh: 企業格點的訪客登記機，掃描識別碼與武器登記。
    description_en: A corpo grid guest kiosk—ID scans and weapon registry.
    message_zh: 登記機提示：「corpo_grid_node 僅限授權 NETRUN——企業區禁止錄影。」
    message_en: 'Kiosk warns: "corpo_grid_node is authorized NETRUN only—no recording in corpo zone."'
  undercity_flood_sensor:
    room_id: undercity_0_0
    name_zh: 淹水感測器
    name_en: Flood Sensor
    description_zh: 地下城格點的淹水感測器，積水深度與毒素讀數閃爍。
    description_en: An undercity grid flood sensor—depth and toxin readings blink.
    message_zh: 感測器讀數異常——undercity_grid_node 可能有未封鎖的資料殘留。
    message_en: "Sensor readings spike—undercity_grid_node may hold unsealed data remnants."