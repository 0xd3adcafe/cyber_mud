    fatigue_delta: -3
    hp_regen_mult: 0.75
    ram_regen: 0
  lying:
    fatigue_delta: -5
    hp_regen_mult: 1.25
    ram_regen: 1
  sleeping:
    fatigue_delta: -10
    hp_regen_mult: 2.0
    ram_regen: 2

